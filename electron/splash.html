<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CVR AMP Controller</title>
    <style>
      :root {
        --color-window-bg: #121212;
        --color-splash-text: #ececec;
        --color-splash-border: #2b2b2b;
        --color-splash-border-top: #686868;
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }

      html, body {
        width: 100%;
        height: 100%;
        background: var(--color-window-bg);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        overflow: hidden;
        user-select: none;
        opacity: 1;
        transition: opacity 220ms ease;
      }

      body.fading-out {
        opacity: 0;
      }

      .logo {
        width: 96px;
        height: 96px;
        margin-bottom: 28px;
        opacity: 0;
        animation: fadeIn 0.35s ease 0.05s forwards;
      }

      .title {
        font-size: 22px;
        font-weight: 600;
        color: var(--color-splash-text);
        letter-spacing: -0.3px;
        margin-bottom: 48px;
        opacity: 0;
        animation: fadeIn 0.35s ease 0.15s forwards;
      }

      .spinner {
        width: 28px;
        height: 28px;
        border: 2.5px solid var(--color-splash-border);
        border-top-color: var(--color-splash-border-top);
        border-radius: 50%;
        opacity: 0;
        animation: fadeIn 0.35s ease 0.25s forwards, spin 0.85s linear 0.25s infinite;
      }

      @keyframes spin   { to { transform: rotate(360deg); } }
      @keyframes fadeIn { to { opacity: 1; } }
    </style>
  </head>
  <body>
    <img class="logo" src="../public/logo.ico" alt="" />
    <div class="title">AMP Controller</div>
    <div class="spinner"></div>
    <script>
      window.startFadeOut = () => {
        const durationMs = 220;
        document.body.classList.add("fading-out");
        return durationMs;
      };
    </script>
  </body>
</html>
